<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Flashcards – Từ Vựng Tiếng Anh</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── CSS VARIABLES ─────────────────────────── */
  :root {
    --bg: #0e0e14;
    --card-bg: #16161f;
    --card-front: #1c1c2a;
    --card-back: #1a2a1a;
    --accent: #b4f26e;
    --accent2: #6eb4f2;
    --accent3: #f26eb4;
    --text: #f0f0f0;
    --muted: #888;
    --border: rgba(255,255,255,0.07);
    /* spacing tokens */
    --px: 16px;       /* mobile horizontal padding */
    --card-h: 240px;
    --card-font: 1.9rem;
    --meaning-font: 1.5rem;
  }

  /* tablet+ */
  @media (min-width: 600px) {
    :root {
      --px: 32px;
      --card-h: 270px;
      --card-font: 2.2rem;
      --meaning-font: 1.8rem;
    }
  }
  /* desktop */
  @media (min-width: 1024px) {
    :root {
      --px: 56px;
      --card-h: 300px;
      --card-font: 2.6rem;
      --meaning-font: 2rem;
    }
  }

  /* ── RESET ──────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;   /* dynamic viewport on mobile */
    overflow-x: hidden;
  }

  /* ── BACKGROUND GLOW ────────────────────────── */
  body::before {
    content: '';
    position: fixed; top: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(180,242,110,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; bottom: -200px; right: -200px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(110,180,242,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    position: relative; z-index: 10;
    padding: 20px var(--px) 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: clamp(10px, 3vw, 24px);
    font-size: clamp(0.72rem, 2.5vw, 0.85rem);
    color: var(--muted);
    flex-wrap: wrap;
  }
  .stats-bar strong {
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 1em;
  }

  /* ── TOPIC SECTION ──────────────────────────── */
  .topic-section {
    position: relative; z-index: 1;
    padding: 20px var(--px) 12px;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* scrollable pill row on mobile */
  .topics-grid {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .topics-grid::-webkit-scrollbar { display: none; }

  @media (min-width: 768px) {
    .topics-grid { flex-wrap: wrap; overflow-x: visible; }
  }

  .topic-btn {
    padding: 7px 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    font-size: clamp(0.72rem, 2.5vw, 0.82rem);
    font-family: 'Noto Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .topic-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .topic-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e14; font-weight: 600; }

  /* ── CARD AREA ──────────────────────────────── */
  .card-area {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px var(--px) 12px;
  }

  /* ── PROGRESS ───────────────────────────────── */
  .progress-row {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .progress-bar-outer {
    flex: 1; height: 4px;
    background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    min-width: 52px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── VOICE BAR ──────────────────────────────── */
  .voice-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 600px;
  }
  .voice-label { font-size: 0.72rem; color: var(--muted); font-family: 'Syne', sans-serif; flex-shrink: 0; }
  .voice-select {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 0.75rem;
    padding: 5px 12px;
    outline: none;
    cursor: pointer;
    font-family: 'Noto Sans', sans-serif;
    max-width: min(200px, 45vw);
    flex: 1;
  }
  .voice-select:focus { border-color: var(--accent2); }
  .auto-speak-toggle {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.72rem; color: var(--muted);
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .toggle-switch {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px; position: relative;
    transition: background 0.25s; flex-shrink: 0;
  }
  .toggle-switch::after {
    content: ''; width: 12px; height: 12px;
    background: white; border-radius: 50%;
    position: absolute; top: 3px; left: 3px;
    transition: left 0.25s;
  }
  .toggle-switch.on { background: var(--accent2); }
  .toggle-switch.on::after { left: 17px; }

  /* ── FLASHCARD ──────────────────────────────── */
  .flashcard-wrapper {
    width: 100%;
    max-width: 600px;
    perspective: 1200px;
    margin-bottom: 16px;
    /* swipe hint shadow on sides — mobile */
    position: relative;
  }

  /* swipe indicator arrows (mobile) */
  .swipe-hint {
    display: none;
  }
  @media (max-width: 599px) {
    .swipe-hint {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 50%; transform: translateY(-50%);
      left: -4px; right: -4px;
      pointer-events: none;
      z-index: 5;
    }
    .swipe-hint span {
      font-size: 1rem;
      color: rgba(255,255,255,0.12);
      padding: 0 2px;
    }
  }

  .flashcard {
    width: 100%;
    height: var(--card-h);
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: pan-y;   /* allow vertical scroll, intercept horizontal */
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  /* swipe animation classes */
  .flashcard.slide-left  { animation: slideLeft  0.3s ease forwards; }
  .flashcard.slide-right { animation: slideRight 0.3s ease forwards; }
  @keyframes slideLeft  { to { opacity:0; transform: translateX(-60px); } }
  @keyframes slideRight { to { opacity:0; transform: translateX(60px); } }

  .card-face {
    position: absolute; width: 100%; height: 100%;
    border-radius: clamp(14px,3vw,22px);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: clamp(20px, 5vw, 40px);
    border: 1px solid var(--border);
  }
  .card-front { background: var(--card-front); }
  .card-back  { background: var(--card-back); transform: rotateY(180deg); border-color: rgba(180,242,110,0.15); }

  .card-topic-tag {
    position: absolute; top: 14px; left: 16px;
    font-size: clamp(0.58rem,2vw,0.68rem);
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); font-family: 'Syne', sans-serif;
  }
  .card-flip-hint {
    position: absolute; top: 14px; right: 16px;
    font-size: clamp(0.58rem,2vw,0.66rem);
    color: var(--muted);
  }

  .card-word {
    font-family: 'Syne', sans-serif;
    font-size: var(--card-font);
    font-weight: 700; text-align: center;
    line-height: 1.1; letter-spacing: -0.5px;
    word-break: break-word;
  }
  .card-meaning {
    font-family: 'Syne', sans-serif;
    font-size: var(--meaning-font);
    font-weight: 700; color: var(--accent);
    text-align: center; margin-bottom: 8px;
    word-break: break-word;
  }
  .card-english-sub {
    font-size: clamp(0.78rem, 2.5vw, 1rem);
    color: var(--muted); text-align: center; font-style: italic;
  }
  .card-number {
    position: absolute; bottom: 14px;
    font-size: 0.72rem; color: var(--muted);
    font-family: 'Syne', sans-serif;
  }

  /* ── SPEAK BUTTON (on card) ─────────────────── */
  .speak-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: clamp(36px,8vw,44px); height: clamp(36px,8vw,44px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted);
    font-size: clamp(0.95rem,3vw,1.15rem);
    transition: all 0.2s; margin-top: 10px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .speak-btn:hover { border-color: var(--accent2); color: var(--accent2); transform: scale(1.1); }
  .speak-btn.speaking {
    border-color: var(--accent2); color: var(--accent2);
    animation: pulse-ring 0.8s ease infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0   rgba(110,180,242,0.4); }
    70%  { box-shadow: 0 0 0 8px rgba(110,180,242,0); }
    100% { box-shadow: 0 0 0 0   rgba(110,180,242,0); }
  }

  /* ── RESULT BUTTONS ─────────────────────────── */
  .result-row {
    display: none; gap: 10px;
    width: 100%; max-width: 600px;
    margin-bottom: 12px;
  }
  .result-row.visible { display: flex; }

  .btn-know, .btn-review {
    flex: 1; padding: clamp(10px,3vw,14px);
    border-radius: 14px;
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: clamp(0.78rem,2.5vw,0.88rem);
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-know   { background: rgba(180,242,110,0.1); border: 1px solid rgba(180,242,110,0.3); color: var(--accent); }
  .btn-review { background: rgba(242,110,180,0.08); border: 1px solid rgba(242,110,180,0.25); color: var(--accent3); }
  .btn-know:hover   { background: rgba(180,242,110,0.2); }
  .btn-review:hover { background: rgba(242,110,180,0.15); }

  /* ── ACTION BUTTONS ─────────────────────────── */
  .action-row {
    display: flex; gap: 10px;
    margin-bottom: 14px;
  }
  .btn {
    padding: clamp(10px,2.5vw,13px) clamp(16px,5vw,28px);
    border-radius: 50px; border: none;
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: clamp(0.78rem,2.5vw,0.9rem);
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-prev { background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); }
  .btn-prev:hover { border-color: var(--text); color: var(--text); }
  .btn-next { background: var(--accent); color: #0e0e14; min-width: 100px; }
  .btn-next:hover { background: #c8f98a; transform: translateY(-1px); }
  .btn-shuffle { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 14px; }
  .btn-shuffle:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── LEGEND ─────────────────────────────────── */
  .legend {
    display: flex; gap: 16px;
    font-size: clamp(0.68rem,2vw,0.75rem);
    color: var(--muted);
  }
  .legend-dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; margin-right: 5px; vertical-align: middle;
  }

  /* ── WORD LIST ──────────────────────────────── */
  .list-section {
    position: relative; z-index: 1;
    padding: 0 var(--px) clamp(40px,8vw,60px);
    max-width: 1280px; margin: 0 auto;
  }
  .list-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
    gap: 12px;
  }
  .search-input {
    padding: 8px 16px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 50px; color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    font-size: clamp(0.78rem,2.5vw,0.85rem);
    outline: none; width: clamp(120px,40vw,220px);
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent2); }

  /* responsive grid: 1 col mobile → 2 → 3 → 4+ */
  .word-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (min-width: 480px)  { .word-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 700px)  { .word-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 1000px) { .word-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1280px) { .word-grid { grid-template-columns: repeat(5, 1fr); } }

  .word-item {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    display: flex; justify-content: space-between;
    align-items: center; gap: 6px;
    font-size: clamp(0.75rem,2.5vw,0.85rem);
    cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .word-item:hover     { border-color: var(--accent); background: rgba(180,242,110,0.04); }
  .word-item.known     { border-color: rgba(180,242,110,0.3); }
  .word-item.needs-review { border-color: rgba(242,110,180,0.3); }
  .word-en { font-weight: 500; flex: 1; min-width: 0; word-break: break-word; }
  .word-vi { color: var(--muted); font-size: 0.72rem; display: none; }
  @media (min-width: 480px) { .word-vi { display: block; flex:1; min-width:0; word-break:break-word; } }

  .speak-mini {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 0.88rem; padding: 4px;
    border-radius: 4px; transition: color 0.15s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .speak-mini:hover { color: var(--accent2); }

  /* ── EMPTY STATE ────────────────────────────── */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <div class="logo">Flash<span>B2</span></div>
  <div class="stats-bar">
    <div>Tổng: <strong id="total-count">0</strong> từ</div>
    <div>Đã biết: <strong id="known-count" style="color:var(--accent)">0</strong></div>
    <div>Cần ôn: <strong id="review-count" style="color:var(--accent3)">0</strong></div>
  </div>
</header>

<div class="topic-section">
  <div class="section-label">Chủ đề</div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<div class="card-area">
  <div class="progress-row">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 / 0</div>
  </div>

  <div class="voice-bar">
    <span class="voice-label">🎙 Giọng:</span>
    <select class="voice-select" id="voice-select" onchange="onVoiceChange()">
      <option value="">Đang tải giọng...</option>
    </select>
    <label class="auto-speak-toggle" onclick="toggleAutoSpeak()">
      <div class="toggle-switch on" id="auto-toggle"></div>
      <span id="auto-label">Tự đọc khi lật</span>
    </label>
  </div>

  <div class="flashcard-wrapper">
    <div class="swipe-hint"><span>‹</span><span>›</span></div>
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-topic-tag" id="card-topic-tag">–</div>
        <div class="card-flip-hint">nhấn để lật ↩</div>
        <div class="card-word" id="card-word">–</div>
        <button class="speak-btn" id="speak-btn-front" onclick="event.stopPropagation(); speakCurrent()" title="Phát âm (S)">🔊</button>
        <div class="card-number" id="card-number">–</div>
      </div>
      <div class="card-face card-back">
        <div class="card-topic-tag" id="card-topic-tag-back">–</div>
        <div class="card-meaning" id="card-meaning">–</div>
        <div class="card-english-sub" id="card-english-sub">–</div>
        <button class="speak-btn" id="speak-btn-back" onclick="event.stopPropagation(); speakCurrent()" title="Phát âm (S)" style="margin-top:8px">🔊</button>
        <div class="card-number" id="card-number-back">–</div>
      </div>
    </div>
  </div>

  <div class="result-row" id="result-row">
    <button class="btn-review" onclick="markCard('review')">🔁 Cần ôn lại</button>
    <button class="btn-know" onclick="markCard('know')">✓ Đã biết</button>
  </div>

  <div class="action-row">
    <button class="btn btn-prev" onclick="prevCard()">← Trước</button>
    <button class="btn btn-next" onclick="nextCard()">Tiếp →</button>
    <button class="btn btn-shuffle" onclick="shuffleCards()" title="Trộn ngẫu nhiên">⇌</button>
  </div>

  <div class="legend">
    <span><span class="legend-dot" style="background:var(--accent)"></span>Đã biết</span>
    <span><span class="legend-dot" style="background:var(--accent3)"></span>Cần ôn</span>
    <span><span class="legend-dot" style="background:var(--border)"></span>Chưa học</span>
  </div>
</div>

<div class="list-section">
  <div class="list-header">
    <div class="section-label" style="margin:0">Danh sách từ vựng</div>
    <input class="search-input" type="text" id="search-input" placeholder="Tìm từ..." oninput="filterWords()">
  </div>
  <div class="word-grid" id="word-grid"></div>
</div>

<script>
const TOPICS = [
  { id: 'all', label: '✦ Tất cả' },
  { id: '1', label: '💼 Nghề nghiệp' },
  { id: '2', label: '⚽ Thể thao' },
  { id: '3', label: '📚 Giáo dục' },
  { id: '4', label: '🏥 Sức khoẻ' },
  { id: '5', label: '🎨 Màu sắc' },
  { id: '6', label: '👗 Trang phục' },
  { id: '7', label: '🍷 Đồ uống' },
  { id: '8', label: '📍 Địa điểm' },
  { id: '9', label: '🏙️ Thành phố' },
  { id: '10', label: '🌿 Nông thôn' },
  { id: '11', label: '🎬 Điện ảnh' },
  { id: '12', label: '🛒 Mua sắm' },
  { id: '13', label: '⏰ Thời gian' },
  { id: '14', label: '🚗 Giao thông' },
  { id: '15', label: '⛅ Thời tiết' },
  { id: '16', label: '🌍 Môi trường' },
  { id: '17', label: '🎮 Giải trí' },
];

const WORDS = [
  // 1. Nghề nghiệp
  {t:'1', en:'Actor / Actress', vi:'Diễn viên nam / nữ'},
  {t:'1', en:'Architect', vi:'Kiến trúc sư'},
  {t:'1', en:'Astronaut', vi:'Phi hành gia'},
  {t:'1', en:'Athlete', vi:'Vận động viên'},
  {t:'1', en:'Banker', vi:'Nhân viên ngân hàng'},
  {t:'1', en:'Business man / Business woman', vi:'Nam / nữ doanh nhân'},
  {t:'1', en:'Chef', vi:'Đầu bếp'},
  {t:'1', en:'Chemist', vi:'Nhà hoá học'},
  {t:'1', en:'Dancer', vi:'Vũ công'},
  {t:'1', en:'Dentist', vi:'Nha sĩ'},
  {t:'1', en:'Doctor', vi:'Bác sĩ'},

const TOPIC_NAMES = {
  '1':'Nghề nghiệp','2':'Thể thao','3':'Giáo dục','4':'Sức khoẻ','5':'Màu sắc',
  '6':'Trang phục','7':'Đồ uống','8':'Địa điểm','9':'Thành phố','10':'Nông thôn',
  '11':'Điện ảnh','12':'Mua sắm','13':'Thời gian','14':'Giao thông','15':'Thời tiết',
  '16':'Môi trường','17':'Giải trí'
};

let currentTopic = 'all';
let deck = [];
let currentIndex = 0;
let isFlipped = false;
let status = {}; // index -> 'know' | 'review'

function getFilteredDeck() {
  if (currentTopic === 'all') return [...WORDS];
  return WORDS.filter(w => w.t === currentTopic);
}

function buildTopics() {
  const grid = document.getElementById('topics-grid');
  TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (t.id === 'all' ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => selectTopic(t.id);
    grid.appendChild(btn);
  });
}

function selectTopic(id) {
  currentTopic = id;
  document.querySelectorAll('.topic-btn').forEach((b,i) => {
    b.classList.toggle('active', TOPICS[i].id === id);
  });
  status = {};
  deck = getFilteredDeck();
  currentIndex = 0;
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  renderCard();
  renderWordGrid();
  updateStats();
}

function renderCard() {
  if (!deck.length) return;
  const w = deck[currentIndex];
  const n = `${currentIndex + 1} / ${deck.length}`;
  document.getElementById('card-word').textContent = w.en;
  document.getElementById('card-meaning').textContent = w.vi;
  document.getElementById('card-english-sub').textContent = w.en;
  document.getElementById('card-topic-tag').textContent = TOPIC_NAMES[w.t] || '';
  document.getElementById('card-topic-tag-back').textContent = TOPIC_NAMES[w.t] || '';
  document.getElementById('card-number').textContent = n;
  document.getElementById('card-number-back').textContent = n;

  const pct = deck.length > 1 ? (currentIndex / (deck.length - 1)) * 100 : 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = n;

  document.getElementById('result-row').classList.remove('visible');
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('result-row').classList.add('visible');
    if (autoSpeak) setTimeout(() => speakCurrent(), 200);
  } else {
    if (autoSpeak) setTimeout(() => speakCurrent(), 100);
  }
}

function nextCard() {
  if (currentIndex < deck.length - 1) {
    currentIndex++;
    isFlipped = false;
    document.getElementById('flashcard').classList.remove('flipped');
    renderCard();
    if (autoSpeak) setTimeout(() => speakCurrent(), 150);
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    document.getElementById('flashcard').classList.remove('flipped');
    renderCard();
    if (autoSpeak) setTimeout(() => speakCurrent(), 150);
  }
}

function shuffleCards() {
  deck = deck.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  renderCard();
  if (autoSpeak) setTimeout(() => speakCurrent(), 150);
}

function markCard(type) {
  const word = deck[currentIndex];
  const key = WORDS.indexOf(word);
  status[key] = type;
  updateStats();
  renderWordGrid();
  setTimeout(() => nextCard(), 300);
}

function updateStats() {
  const all = WORDS.length;
  let known = 0, review = 0;
  Object.values(status).forEach(v => { if(v==='know') known++; else review++; });
  document.getElementById('total-count').textContent = deck.length;
  document.getElementById('known-count').textContent = known;
  document.getElementById('review-count').textContent = review;
}

function renderWordGrid() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const grid = document.getElementById('word-grid');
  const source = currentTopic === 'all' ? WORDS : WORDS.filter(w => w.t === currentTopic);
  const filtered = source.filter(w => w.en.toLowerCase().includes(q) || w.vi.toLowerCase().includes(q));
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Không tìm thấy từ nào.</div>';
    return;
  }
  filtered.forEach(w => {
    const idx = WORDS.indexOf(w);
    const s = status[idx];
    const div = document.createElement('div');
    div.className = 'word-item' + (s === 'know' ? ' known' : s === 'review' ? ' needs-review' : '');
    div.innerHTML = `<span class="word-en">${w.en}</span><span class="word-vi">${w.vi}</span><button class="speak-mini" title="Phát âm">🔊</button>`;
    div.querySelector('.speak-mini').onclick = (e) => { e.stopPropagation(); speak(w.en); };
    div.onclick = () => jumpToWord(w);
    grid.appendChild(div);
  });
}

function jumpToWord(w) {
  const idx = deck.indexOf(w);
  if (idx >= 0) {
    currentIndex = idx;
    isFlipped = false;
    document.getElementById('flashcard').classList.remove('flipped');
    renderCard();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

function filterWords() { renderWordGrid(); }

// keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 'k' || e.key === 'K') markCard('know');
  else if (e.key === 'r' || e.key === 'R') markCard('review');
  else if (e.key === 's' || e.key === 'S') speakCurrent();
});

// ── TOUCH SWIPE (mobile) ────────────────────────────────
(function() {
  const card = document.getElementById('flashcard');
  let startX = 0, startY = 0, dragging = false;
  const SWIPE_THRESHOLD = 50;

  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = true;
  }, { passive: true });

  card.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // ignore if vertical scroll dominates
    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < SWIPE_THRESHOLD) return;
    // horizontal swipe
    e.preventDefault();
    if (dx < 0) nextCard();   // swipe left → next
    else         prevCard();  // swipe right → prev
  }, { passive: true });
})();
// ────────────────────────────────────────────────────────

// ── TTS ENGINE ──────────────────────────────────────────
let voices = [];
let selectedVoice = null;
let autoSpeak = true;

function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById('voice-select');
  // Filter English voices
  const enVoices = voices.filter(v => v.lang.startsWith('en'));
  if (!enVoices.length) {
    sel.innerHTML = '<option value="">Trình duyệt không hỗ trợ giọng tiếng Anh</option>';
    return;
  }
  sel.innerHTML = '';
  // Prefer common high-quality voices first
  const preferred = ['Google US English','Google UK English Female','Microsoft Zira','Microsoft David','Samantha','Karen','Daniel'];
  const sorted = [
    ...enVoices.filter(v => preferred.some(p => v.name.includes(p.split(' ')[1] || p))),
    ...enVoices.filter(v => !preferred.some(p => v.name.includes(p.split(' ')[1] || p)))
  ];
  sorted.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });
  // Pick best default: prefer en-US or en-GB
  const def = sorted.find(v => v.lang === 'en-US') || sorted.find(v => v.lang === 'en-GB') || sorted[0];
  selectedVoice = def;
  sel._voices = sorted;
  sel.value = sorted.indexOf(def);
}

function onVoiceChange() {
  const sel = document.getElementById('voice-select');
  if (sel._voices) selectedVoice = sel._voices[parseInt(sel.value)];
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.lang = selectedVoice ? selectedVoice.lang : 'en-US';
  utt.rate = 0.88;
  utt.pitch = 1;

  // Animate speaker buttons
  const btns = document.querySelectorAll('.speak-btn');
  btns.forEach(b => b.classList.add('speaking'));
  utt.onend = () => btns.forEach(b => b.classList.remove('speaking'));
  utt.onerror = () => btns.forEach(b => b.classList.remove('speaking'));

  window.speechSynthesis.speak(utt);
}

function speakCurrent() {
  if (!deck.length) return;
  speak(deck[currentIndex].en);
}

function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  document.getElementById('auto-toggle').classList.toggle('on', autoSpeak);
}

// Load voices (Chrome loads async)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}
// ────────────────────────────────────────────────────────

// Init
buildTopics();
deck = [...WORDS];
renderCard();
renderWordGrid();
updateStats();
</script>
